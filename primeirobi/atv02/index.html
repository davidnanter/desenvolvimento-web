<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página de Cadastro</title>
</head>
<body>

    <form action="#" method="post">
        <fieldset>
            <legend>Crie sua Conta</legend>
            
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="senha">Senha (mínimo 8 caracteres):</label><br>
            <input type="password" id="senha" name="senha" minlength="8" required><br><br>

            <b>Gênero:</b><br>
            <input type="radio" id="fem" name="genero" value="feminino">
            <label for="fem">Feminino</label><br>
            <input type="radio" id="masc" name="genero" value="masculino">
            <label for="masc">Masculino</label><br><br>

            <label for="bio">Biografia:</label><br>
            <textarea id="bio" name="bio" rows="4" placeholder="Fale um pouco sobre você..."></textarea><br><br>

            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Eu li e aceito os termos de serviço.</label><br><br>

            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>
        </fieldset>
    </form>

</body>
</html>
